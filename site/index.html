<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>perShop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Lalezar&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <header class="site-header">
    <button id="themeToggle" class="theme-toggle" aria-label="تغییر حالت روشن/تاریک">🌙</button>
    <div class="header-inner">
      <h1 class="brand">per<span>Shop</span></h1>
      <p class="tagline">دفترچه‌ی فروش، همیشه به‌روز</p>
    </div>
    <div class="header-stitch" aria-hidden="true"></div>
  </header>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="جستجوی محصول..." autocomplete="off">
      </div>
      <select id="sortSelect" class="sort-select">
        <option value="default">جدیدترین</option>
        <option value="price_asc">ارزان‌ترین</option>
        <option value="price_desc">گران‌ترین</option>
      </select>
    </div>

    <nav class="category-tabs" id="categoryTabs" aria-label="دسته‌بندی محصولات">
      <button class="tab active" data-category="all">همه</button>
    </nav>
    <div class="perforation" aria-hidden="true"></div>

    <section id="productGrid" class="product-grid" aria-live="polite">
      <!-- کارت‌های محصول اینجا با JS رندر می‌شن -->
    </section>

    <div id="skeletonGrid" class="product-grid skeleton-grid" aria-hidden="true">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <p id="emptyState" class="empty-state" hidden>
      فعلاً محصولی برای نمایش نیست. به‌زودی برمی‌گردیم 🌱
    </p>
  </main>

  <div id="sheetOverlay" class="sheet-overlay" hidden data-close></div>
  <div id="productSheet" class="product-sheet" hidden role="dialog" aria-modal="true">
    <div class="sheet-handle" data-close aria-hidden="true"></div>
    <div class="sheet-image-wrap">
      <img id="sheetImage" src="" alt="">
      <span id="sheetStamp" class="stamp" hidden>تازه</span>
    </div>
    <div class="sheet-body">
      <span id="sheetCategory" class="sheet-category"></span>
      <h2 id="sheetTitle"></h2>
      <p id="sheetDescription"></p>

      <div class="price-tag-row">
        <div class="price-tag">
          <span class="price-tag-hole"></span>
          <span id="sheetPrice" class="price-tag-amount"></span>
        </div>
        <button id="sheetBuyBtn" class="buy-btn">سفارش از طریق تلگرام</button>
      </div>
      <p id="sheetOutOfStock" class="out-of-stock-note" hidden>این محصول فعلاً ناموجود است</p>
    </div>
  </div>

  <footer class="site-footer">
    <p>perShop — مدیریت محصولات از طریق ربات تلگرام</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
